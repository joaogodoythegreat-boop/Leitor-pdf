<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leitor">
<meta name="theme-color" content="#e8dcc0">
<title>Leitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root {
    --paper: #e8dcc0;
    --page: #f3ead4;
    --ink: #2e2a22;
    --ink-soft: #7a6f5c;
    --edge: #d4c5a3;
    --shadow: rgba(60, 45, 20, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body {
    height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }

  /* ===== BIBLIOTECA ===== */
  #library {
    position: fixed; inset: 0; z-index: 20;
    background: radial-gradient(120% 60% at 50% -10%, #efe4c8 0%, var(--paper) 60%);
    display: flex; flex-direction: column;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .lib-head { padding: calc(env(safe-area-inset-top) + 26px) 22px 6px; }
  .lib-head h1 { font-size: 30px; font-weight: normal; letter-spacing: 0.5px; }

  #profileChip {
    margin: 14px 22px 0; align-self: flex-start;
    display: inline-flex; align-items: center; gap: 10px;
    padding: 7px 14px 7px 8px; border-radius: 30px;
    background: rgba(255,255,255,0.35); border: 1px solid var(--edge); cursor: pointer;
  }
  #profileChip:active { background: rgba(255,255,255,0.6); }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px; font-weight: bold;
  }
  #profileChip .pname { font-size: 15px; }
  #profileChip .caret { font-size: 11px; color: var(--ink-soft); }

  #addBtn {
    margin: 18px 22px; border: 1px solid var(--ink); background: transparent; color: var(--ink);
    font-family: inherit; font-size: 16px; padding: 14px; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  #addBtn:active { background: var(--ink); color: var(--paper); }

  #shelf { padding: 0 16px 50px; display: flex; flex-direction: column; gap: 10px; }
  .book {
    display: flex; align-items: center; gap: 16px; padding: 12px; border-radius: 10px; cursor: pointer;
    background: rgba(255,255,255,0.3); border: 1px solid rgba(212,197,163,0.6);
  }
  .book:active { background: rgba(255,255,255,0.55); }
  .book-cover {
    width: 58px; height: 82px; flex-shrink: 0; border-radius: 4px;
    background: var(--page) center/cover no-repeat; box-shadow: 0 2px 8px var(--shadow);
    display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--ink-soft); overflow: hidden;
  }
  .book-info { flex: 1; min-width: 0; }
  .book-title {
    font-size: 16px; line-height: 1.3; margin-bottom: 7px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .book-meta { font-size: 12px; color: var(--ink-soft); }
  .progress-track { height: 4px; background: var(--edge); border-radius: 3px; margin-top: 9px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ink-soft); border-radius: 3px; }
  .book-del {
    width: 34px; height: 34px; flex-shrink: 0; border: none; background: transparent;
    color: var(--ink-soft); font-size: 18px; border-radius: 50%; cursor: pointer; align-self: flex-start;
  }
  .book-del:active { background: rgba(0,0,0,0.08); }
  .empty { text-align: center; color: var(--ink-soft); padding: 50px 30px; font-size: 15px; line-height: 1.6; }

  /* ===== Sheet de perfis ===== */
  #sheet { position: fixed; inset: 0; z-index: 40; display: none; background: rgba(20,15,5,0.4); }
  #sheet.on { display: block; }
  #sheetCard {
    position: absolute; left: 0; right: 0; bottom: 0; background: var(--paper);
    border-radius: 18px 18px 0 0; padding: 10px 16px calc(env(safe-area-inset-bottom) + 18px);
    max-height: 80%; overflow-y: auto;
  }
  .sheet-grip { width: 40px; height: 4px; background: var(--edge); border-radius: 3px; margin: 8px auto 14px; }
  .sheet-title { font-size: 18px; margin: 0 4px 12px; }
  .prow { display: flex; align-items: center; gap: 12px; padding: 12px 8px; border-radius: 10px; cursor: pointer; }
  .prow:active { background: rgba(0,0,0,0.05); }
  .prow.active { background: rgba(255,255,255,0.5); }
  .prow .pname { flex: 1; font-size: 16px; }
  .prow .check { color: var(--ink-soft); font-size: 16px; }
  .prow .pdel { border: none; background: transparent; color: var(--ink-soft); font-size: 16px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
  .prow .pdel:active { background: rgba(0,0,0,0.08); }
  #addProfileBtn {
    width: 100%; margin-top: 8px; border: 1px dashed var(--ink-soft); background: transparent;
    color: var(--ink); font-family: inherit; font-size: 15px; padding: 13px; border-radius: 10px; cursor: pointer;
  }
  #addProfileBtn:active { background: rgba(0,0,0,0.05); }

  /* ===== Modal nome ===== */
  #nameModal { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; background: rgba(20,15,5,0.45); padding: 24px; }
  #nameModal.on { display: flex; }
  .modal-card { background: var(--paper); border-radius: 14px; padding: 22px; width: 100%; max-width: 340px; }
  .modal-card h3 { font-weight: normal; font-size: 18px; margin-bottom: 14px; }
  #nameInput {
    width: 100%; font-family: inherit; font-size: 16px; padding: 12px; border: 1px solid var(--edge);
    border-radius: 8px; background: #fff; color: var(--ink); -webkit-user-select: text; user-select: text;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions button { flex: 1; font-family: inherit; font-size: 15px; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--ink); }
  #nameCancel { background: transparent; color: var(--ink); }
  #nameSave { background: var(--ink); color: var(--paper); }

  /* ===== LEITOR ===== */
  #reader { display: none; position: fixed; inset: 0; flex-direction: column; background: var(--paper); z-index: 10; }
  #canvasWrap { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; display: flex; align-items: flex-start; justify-content: center; padding: 14px; }
  #pageFrame { background: var(--page); padding: 22px 18px; border-radius: 3px; box-shadow: 0 2px 16px var(--shadow); max-width: 100%; }
  #pageFrame canvas { display: block; max-width: 100%; height: auto; mix-blend-mode: multiply; }

  #reflowClip {
    position: fixed; inset: 0; z-index: 8; display: none; background: var(--page);
    padding-top: calc(env(safe-area-inset-top) + 4px);
    padding-bottom: calc(64px + env(safe-area-inset-bottom));
  }
  #reflowClip.on { display: block; }
  #reflowPage { height: 100%; max-width: 660px; margin: 0 auto; padding: 8px 24px; position: relative; }
  #reflowText {
    height: 100%; width: 100%; overflow: hidden;
    font-family: Georgia, "Times New Roman", serif; color: var(--ink);
    line-height: 1.55; text-align: justify; -webkit-hyphens: auto; hyphens: auto; overflow-wrap: break-word;
  }
  #reflowText p { margin: 0 0 0.32em; text-indent: 1.3em; }
  #reflowText p.first, #reflowText p.cont { text-indent: 0; }
  #reflowText p.head { text-indent: 0; text-align: center; font-weight: bold; margin: 0.2em 0 0.7em; letter-spacing: 0.5px; }

  .tapzone { position: fixed; top: 0; bottom: 64px; width: 28%; z-index: 9; }
  .tapzone.left { left: 0; }
  .tapzone.right { right: 0; }

  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 12;
    padding: calc(env(safe-area-inset-top) + 8px) 14px 10px;
    background: linear-gradient(var(--paper), rgba(232,220,192,0));
    display: flex; align-items: center; gap: 10px; transition: transform 0.25s ease, opacity 0.25s ease;
  }
  #topbar.hidden { transform: translateY(-100%); opacity: 0; }
  #backBtn { border: none; background: transparent; color: var(--ink); font-size: 16px; font-family: inherit; cursor: pointer; padding: 6px 0; }
  #bookName { font-size: 14px; color: var(--ink-soft); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #modeBtn { border: 1px solid var(--ink-soft); background: transparent; color: var(--ink); font-family: inherit; font-size: 13px; padding: 6px 12px; border-radius: 14px; cursor: pointer; flex-shrink: 0; }
  #modeBtn:active { background: var(--edge); }

  #bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 12;
    height: calc(64px + env(safe-area-inset-bottom)); padding: 0 14px env(safe-area-inset-bottom);
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: linear-gradient(rgba(243,234,212,0), var(--page) 45%); transition: transform 0.25s ease, opacity 0.25s ease;
  }
  #bar.hidden { transform: translateY(100%); opacity: 0; }
  #bar button { border: none; background: transparent; color: var(--ink); font-family: Georgia, serif; cursor: pointer; }
  #prev, #next { font-size: 26px; width: 42px; height: 42px; border-radius: 50%; }
  #prev:active, #next:active { background: var(--edge); }
  #pageInfo { font-size: 13px; color: var(--ink-soft); flex: 1; text-align: center; }
  .ctrl { display: flex; align-items: center; gap: 6px; }
  .ctrl button { font-size: 19px; width: 38px; height: 38px; border-radius: 50%; }
  .ctrl button:active { background: var(--edge); }
  .ctrl span { font-size: 12px; color: var(--ink-soft); min-width: 40px; text-align: center; }

  #loading { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: var(--paper); color: var(--ink-soft); font-size: 15px; z-index: 30; }
</style>
</head>
<body>

<div id="library">
  <div class="lib-head"><h1>Biblioteca</h1></div>
  <div id="profileChip">
    <span class="avatar" id="chipAvatar">V</span>
    <span class="pname" id="chipName">Você</span>
    <span class="caret">▼</span>
  </div>
  <button id="addBtn">+ Adicionar livro (PDF)</button>
  <input type="file" id="file" accept="application/pdf" hidden>
  <div id="shelf"></div>
</div>

<div id="sheet">
  <div id="sheetCard">
    <div class="sheet-grip"></div>
    <div class="sheet-title">Quem está lendo?</div>
    <div id="profileList"></div>
    <button id="addProfileBtn">+ Novo leitor</button>
  </div>
</div>

<div id="nameModal">
  <div class="modal-card">
    <h3>Novo leitor</h3>
    <input id="nameInput" type="text" placeholder="Nome" maxlength="24" autocomplete="off">
    <div class="modal-actions">
      <button id="nameCancel">Cancelar</button>
      <button id="nameSave">Salvar</button>
    </div>
  </div>
</div>

<div id="loading">Carregando…</div>

<div id="reader">
  <div id="topbar">
    <button id="backBtn">‹ Biblioteca</button>
    <span id="bookName"></span>
    <button id="modeBtn">Texto</button>
  </div>
  <div id="canvasWrap"><div id="pageFrame"><canvas id="canvas"></canvas></div></div>
  <div id="reflowClip"><div id="reflowPage"><div id="reflowText" lang="pt-BR"></div></div></div>
  <div class="tapzone left" id="tapLeft"></div>
  <div class="tapzone right" id="tapRight"></div>
  <div id="bar">
    <button id="prev">‹</button>
    <span id="pageInfo">—</span>
    <div class="ctrl">
      <button id="zoomOut">A−</button>
      <span id="zoomLevel">100%</span>
      <button id="zoomIn">A+</button>
    </div>
    <button id="next">›</button>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const DB_NAME = "leitorDB", STORE = "books", META = "meta";
const PALETTE = ["#c8a44d","#9a6b4f","#5f7d6a","#7a6f9c","#a85c6b","#5b7d99"];
let db;

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 2);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: "id" });
      if (!d.objectStoreNames.contains(META)) d.createObjectStore(META, { keyPath: "k" });
    };
    r.onsuccess = e => { db = e.target.result; res(db); };
    r.onerror = e => rej(e);
  });
}
function txS(store, mode) { return db.transaction(store, mode).objectStore(store); }
function dbGetAll() {
  return new Promise((res, rej) => {
    const out = []; const c = txS(STORE, "readonly").openCursor();
    c.onsuccess = e => { const cur = e.target.result; if (cur) { out.push(cur.value); cur.continue(); } else res(out); };
    c.onerror = rej;
  });
}
function dbGet(id) { return new Promise((res, rej) => { const r = txS(STORE, "readonly").get(id); r.onsuccess = () => res(r.result); r.onerror = rej; }); }
function dbPut(v) { return new Promise((res, rej) => { const r = txS(STORE, "readwrite").put(v); r.onsuccess = res; r.onerror = rej; }); }
function dbDel(id) { return new Promise((res, rej) => { const r = txS(STORE, "readwrite").delete(id); r.onsuccess = res; r.onerror = rej; }); }
function metaGet(k) { return new Promise((res, rej) => { const r = txS(META, "readonly").get(k); r.onsuccess = () => res(r.result); r.onerror = rej; }); }
function metaPut(k, v) { return new Promise((res, rej) => { const r = txS(META, "readwrite").put({ k: k, v: v }); r.onsuccess = res; r.onerror = rej; }); }

const $ = id => document.getElementById(id);
const canvas = $("canvas"), ctx = canvas.getContext("2d");
let pdfDoc = null, current = null;
let pageNum = 1, zoom = 1.0, fontPx = 20, mode = "page", rendering = false, pendingPage = null;
let screenIdx = 0, curScreens = [""], pagedKey = "";
const BASE = 1.7;

let profiles = { list: [{ id: "default", name: "Você", color: PALETTE[0] }], current: "default" };
async function loadProfiles() {
  const m = await metaGet("profiles");
  if (m && m.v && m.v.list && m.v.list.length) profiles = m.v;
  else await saveProfiles();
}
function saveProfiles() { return metaPut("profiles", profiles); }
function curProf() { return profiles.list.find(p => p.id === profiles.current) || profiles.list[0]; }
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

function refreshChip() {
  const p = curProf();
  $("chipAvatar").textContent = (p.name[0] || "?").toUpperCase();
  $("chipAvatar").style.background = p.color || PALETTE[0];
  $("chipName").textContent = p.name;
}

$("profileChip").onclick = () => { renderProfileList(); $("sheet").classList.add("on"); };
$("sheet").onclick = e => { if (e.target.id === "sheet") $("sheet").classList.remove("on"); };

function renderProfileList() {
  const list = $("profileList");
  list.innerHTML = "";
  profiles.list.forEach(p => {
    const row = document.createElement("div");
    row.className = "prow" + (p.id === profiles.current ? " active" : "");
    row.innerHTML =
      '<span class="avatar" style="background:' + (p.color || PALETTE[0]) + '">' + escapeHtml((p.name[0] || "?").toUpperCase()) + '</span>' +
      '<span class="pname">' + escapeHtml(p.name) + '</span>' +
      (p.id === profiles.current ? '<span class="check">✓</span>' : '') +
      (profiles.list.length > 1 ? '<button class="pdel">✕</button>' : '');
    row.querySelector(".pname").onclick = () => switchProfile(p.id);
    row.querySelector(".avatar").onclick = () => switchProfile(p.id);
    const del = row.querySelector(".pdel");
    if (del) del.onclick = (ev) => { ev.stopPropagation(); deleteProfile(p.id); };
    list.appendChild(row);
  });
}
async function switchProfile(id) {
  profiles.current = id; await saveProfiles();
  refreshChip(); $("sheet").classList.remove("on"); renderShelf();
}
async function deleteProfile(id) {
  const p = profiles.list.find(x => x.id === id);
  if (!p) return;
  if (!confirm('Remover o leitor "' + p.name + '" e todos os livros dele?')) return;
  const books = await dbGetAll();
  for (const b of books) { if ((b.profile || "default") === id) await dbDel(b.id); }
  profiles.list = profiles.list.filter(x => x.id !== id);
  if (profiles.current === id) profiles.current = profiles.list[0].id;
  await saveProfiles();
  refreshChip(); renderProfileList(); renderShelf();
}

$("addProfileBtn").onclick = () => {
  $("nameInput").value = ""; $("nameModal").classList.add("on");
  setTimeout(() => $("nameInput").focus(), 50);
};
$("nameCancel").onclick = () => $("nameModal").classList.remove("on");
$("nameSave").onclick = async () => {
  const name = $("nameInput").value.trim();
  if (!name) { $("nameInput").focus(); return; }
  const id = "p_" + Date.now();
  const color = PALETTE[profiles.list.length % PALETTE.length];
  profiles.list.push({ id: id, name: name, color: color });
  profiles.current = id; await saveProfiles();
  $("nameModal").classList.remove("on");
  refreshChip(); renderProfileList(); renderShelf();
};

async function renderShelf() {
  const all = await dbGetAll();
  const books = all.filter(b => (b.profile || "default") === profiles.current);
  books.sort((a, b) => (b.lastRead || 0) - (a.lastRead || 0));
  const shelf = $("shelf");
  if (!books.length) {
    shelf.innerHTML = '<div class="empty">Nenhum livro ainda.<br>Toque em &ldquo;Adicionar livro&rdquo; pra começar.</div>';
    return;
  }
  shelf.innerHTML = "";
  for (const b of books) {
    const pct = b.pages ? Math.round((b.page / b.pages) * 100) : 0;
    const el = document.createElement("div");
    el.className = "book";
    const coverStyle = b.cover ? ' style="background-image:url(' + b.cover + ')"' : '';
    const coverInner = b.cover ? '' : '&#9636;';
    el.innerHTML =
      '<div class="book-cover"' + coverStyle + '>' + coverInner + '</div>' +
      '<div class="book-info">' +
        '<div class="book-title">' + escapeHtml(b.title) + '</div>' +
        '<div class="book-meta">' + (b.pages ? ('Pág. ' + b.page + ' de ' + b.pages + ' · ' + pct + '%') : 'Não aberto') + '</div>' +
        '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
      '</div>' +
      '<button class="book-del">&#10005;</button>';
    el.querySelector(".book-info").onclick = () => openBook(b.id);
    el.querySelector(".book-cover").onclick = () => openBook(b.id);
    el.querySelector(".book-del").onclick = async (ev) => {
      ev.stopPropagation();
      if (confirm('Remover "' + b.title + '" da biblioteca?')) { await dbDel(b.id); renderShelf(); }
    };
    shelf.appendChild(el);
  }
}

$("addBtn").onclick = () => $("file").click();
$("file").onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  $("loading").style.display = "flex"; $("loading").textContent = "Importando…";
  const fr = new FileReader();
  fr.onload = async ev => {
    const buf = ev.target.result;
    let pages = 0, cover = null;
    try {
      const doc = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
      pages = doc.numPages;
      cover = await makeCover(doc);
    } catch (err) {}
    const rec = {
      id: "b_" + Date.now(), profile: profiles.current,
      title: f.name.replace(/\.pdf$/i, ""), data: buf, cover: cover,
      page: 1, screen: 0, pages: pages, zoom: 1.0, fontPx: 20, mode: "page", lastRead: Date.now()
    };
    await dbPut(rec);
    $("file").value = "";
    $("loading").style.display = "none";
    renderShelf();
  };
  fr.readAsArrayBuffer(f);
};

async function makeCover(doc) {
  try {
    const page = await doc.getPage(1);
    const vp = page.getViewport({ scale: 1 });
    const s = 220 / vp.width;
    const v = page.getViewport({ scale: s });
    const c = document.createElement("canvas");
    c.width = v.width; c.height = v.height;
    await page.render({ canvasContext: c.getContext("2d"), viewport: v }).promise;
    return c.toDataURL("image/jpeg", 0.7);
  } catch (e) { return null; }
}

async function openBook(id) {
  const rec = await dbGet(id);
  if (!rec) return;
  $("loading").style.display = "flex"; $("loading").textContent = "Abrindo…";
  current = rec;
  pageNum = rec.page || 1;
  screenIdx = rec.screen || 0;
  zoom = rec.zoom || 1.0;
  fontPx = rec.fontPx || 20;
  mode = rec.mode || "page";
  pagedKey = "";
  $("bookName").textContent = rec.title;
  pdfDoc = await pdfjsLib.getDocument({ data: rec.data.slice(0) }).promise;
  if (!rec.pages) rec.pages = pdfDoc.numPages;
  $("loading").style.display = "none";
  $("library").style.display = "none";
  $("reader").style.display = "flex";
  applyModeUI();
  await renderCurrent();
}

function applyModeUI() {
  const text = mode === "text";
  $("canvasWrap").style.display = text ? "none" : "flex";
  $("reflowClip").classList.toggle("on", text);
  $("modeBtn").textContent = text ? "Página" : "Texto";
  $("zoomLevel").textContent = text ? (fontPx + "px") : (Math.round(zoom * 100) + "%");
}

async function renderCurrent() {
  if (mode === "text") { await ensurePaged(pageNum); clampScreen(); showText(); }
  else renderPage(pageNum);
}

function renderPage(num) {
  if (!pdfDoc) return;
  rendering = true;
  pdfDoc.getPage(num).then(page => {
    const unscaled = page.getViewport({ scale: 1 });
    const avail = window.innerWidth - 28 - 36;
    const fitScale = avail / unscaled.width;
    const viewport = page.getViewport({ scale: fitScale * BASE * zoom });
    const ratio = window.devicePixelRatio || 1;
    canvas.width = viewport.width * ratio;
    canvas.height = viewport.height * ratio;
    canvas.style.width = viewport.width + "px";
    canvas.style.height = viewport.height + "px";
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    page.render({ canvasContext: ctx, viewport: viewport }).promise.then(() => {
      rendering = false;
      if (pendingPage !== null) { const p = pendingPage; pendingPage = null; renderPage(p); }
    });
    $("pageInfo").textContent = num + " / " + pdfDoc.numPages;
    $("canvasWrap").scrollTop = 0;
    saveProgress();
  });
}
function queuePage(num) { if (rendering) pendingPage = num; else renderPage(num); }

function readArea() {
  const el = $("reflowText");
  let W = el.clientWidth, H = el.clientHeight;
  if (W < 80) W = Math.min(window.innerWidth - 48, 612);
  if (H < 80) H = window.innerHeight - 150;
  return { W: W, H: H };
}

async function ensurePaged(num) {
  const a = readArea();
  const key = num + "|" + fontPx + "|" + a.W + "|" + a.H;
  if (key === pagedKey && curScreens.length) return;
  let blocks = [];
  try {
    const page = await pdfDoc.getPage(num);
    blocks = await extractReflow(page);
  } catch (e) { blocks = []; }
  if (!blocks.length) {
    mode = "page"; applyModeUI(); renderPage(num);
    curScreens = [""]; pagedKey = "";
    return;
  }
  curScreens = paginate(blocks, a.W, a.H, fontPx);
  pagedKey = key;
}

function clampScreen() {
  if (screenIdx > curScreens.length - 1) screenIdx = curScreens.length - 1;
  if (screenIdx < 0) screenIdx = 0;
}
function showText() {
  $("reflowText").innerHTML = curScreens[screenIdx] || "";
  $("pageInfo").textContent = pageNum + " / " + pdfDoc.numPages;
  saveProgress();
}

async function goText(d) {
  if (d > 0) {
    if (screenIdx < curScreens.length - 1) { screenIdx++; }
    else {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++; pagedKey = ""; await ensurePaged(pageNum);
      if (mode !== "text") return;
      screenIdx = 0;
    }
  } else {
    if (screenIdx > 0) { screenIdx--; }
    else {
      if (pageNum <= 1) return;
      pageNum--; pagedKey = ""; await ensurePaged(pageNum);
      if (mode !== "text") return;
      screenIdx = curScreens.length - 1;
    }
  }
  clampScreen(); showText();
}

function paginate(blocks, W, H, fpx) {
  const meas = document.createElement("div");
  meas.style.cssText = "position:absolute;left:-99999px;top:0;visibility:hidden;width:" + W + "px;" +
    "font-family:Georgia,'Times New Roman',serif;font-size:" + fpx + "px;line-height:1.55;text-align:justify;" +
    "-webkit-hyphens:auto;hyphens:auto;overflow-wrap:break-word;";
  document.body.appendChild(meas);
  function pTag(text, cls) {
    let st = "margin:0 0 0.32em;";
    if (cls === "head") st += "text-indent:0;text-align:center;font-weight:bold;";
    else if (cls === "cont" || cls === "first") st += "text-indent:0;";
    else st += "text-indent:1.3em;";
    return '<p style="' + st + '">' + escapeHtml(text) + '</p>';
  }
  function fits(html) { meas.innerHTML = html; return meas.scrollHeight <= H + 1; }

  const screens = [];
  let cur = "", first = true;
  for (const b of blocks) {
    const cls = b.head ? "head" : (first ? "first" : "");
    const tag = pTag(b.text, cls);
    if (fits(cur + tag)) { cur += tag; first = false; continue; }
    if (!cur) {
      const parts = splitPara(b, H, meas);
      for (let k = 0; k < parts.length; k++) { if (k < parts.length - 1) screens.push(parts[k]); else cur = parts[k]; }
    } else {
      screens.push(cur); cur = "";
      if (fits(tag)) { cur = tag; }
      else {
        const parts = splitPara(b, H, meas);
        for (let k = 0; k < parts.length; k++) { if (k < parts.length - 1) screens.push(parts[k]); else cur = parts[k]; }
      }
    }
    first = false;
  }
  if (cur) screens.push(cur);
  document.body.removeChild(meas);
  return screens.length ? screens : [""];
}

function splitPara(b, H, meas) {
  const words = b.text.split(/\s+/);
  const cls0 = b.head ? "head" : "first";
  const parts = [];
  let cur = [];
  function tag(arr, cont) {
    const c = cont ? "cont" : cls0;
    let st = "margin:0 0 0.32em;";
    if (c === "head") st += "text-indent:0;text-align:center;font-weight:bold;";
    else st += "text-indent:0;";
    return '<p style="' + st + '">' + escapeHtml(arr.join(" ")) + '</p>';
  }
  for (let i = 0; i < words.length; i++) {
    cur.push(words[i]);
    meas.innerHTML = tag(cur, parts.length > 0);
    if (meas.scrollHeight > H + 1) {
      if (cur.length > 1) { cur.pop(); parts.push(tag(cur, parts.length > 0)); cur = [words[i]]; }
      else { parts.push(tag(cur, parts.length > 0)); cur = []; }
    }
  }
  if (cur.length) parts.push(tag(cur, parts.length > 0));
  return parts.length ? parts : [tag([""], false)];
}

async function extractReflow(page) {
  const tc = await page.getTextContent();
  const raw = tc.items.filter(it => typeof it.str === "string" && it.str.length);
  if (!raw.length) return [];
  const lines = [];
  for (const it of raw) {
    const x = it.transform[4], y = it.transform[5];
    const fs = Math.hypot(it.transform[0], it.transform[1]) || it.height || 12;
    let line = null;
    for (const l of lines) { if (Math.abs(l.y - y) <= Math.max(3, fs * 0.4)) { line = l; break; } }
    if (!line) { line = { y: y, items: [] }; lines.push(line); }
    line.items.push({ x: x, str: it.str, w: it.width || 0, fs: fs });
  }
  lines.sort((a, b) => b.y - a.y);
  const L = [];
  for (const l of lines) {
    l.items.sort((a, b) => a.x - b.x);
    let text = "", prevEnd = null, minX = Infinity, maxFs = 0;
    for (const it of l.items) {
      if (prevEnd !== null) {
        const gap = it.x - prevEnd;
        if (gap > it.fs * 0.25 && !/\s$/.test(text) && !/^\s/.test(it.str)) text += " ";
      }
      text += it.str; prevEnd = it.x + it.w;
      if (it.x < minX) minX = it.x;
      if (it.fs > maxFs) maxFs = it.fs;
    }
    text = text.replace(/\s+/g, " ").trim();
    if (text) L.push({ y: l.y, x0: minX, fs: maxFs, text: text });
  }
  if (!L.length) return [];
  const gaps = [];
  for (let i = 1; i < L.length; i++) gaps.push(Math.abs(L[i - 1].y - L[i].y));
  gaps.sort((a, b) => a - b);
  const medGap = gaps.length ? gaps[Math.floor(gaps.length / 2)] : 0;
  const leftMin = Math.min.apply(null, L.map(l => l.x0));
  const fsArr = L.map(l => l.fs).sort((a, b) => a - b);
  const bodyFs = fsArr[Math.floor(fsArr.length / 2)] || 12;
  const blocks = [];
  let buf = "", bufHead = false;
  for (let i = 0; i < L.length; i++) {
    const l = L[i], prev = L[i - 1];
    let brk = false;
    if (i > 0) {
      const g = Math.abs(prev.y - l.y);
      if (medGap && g > medGap * 1.6) brk = true;
      if (l.x0 > leftMin + l.fs * 0.8) brk = true;
      if (Math.abs(l.fs - prev.fs) > 1.5) brk = true;
    }
    if (brk && buf) { blocks.push({ text: buf, head: bufHead }); buf = ""; bufHead = false; }
    if (!buf) bufHead = (l.fs > bodyFs * 1.18);
    if (buf) {
      if (/[\-\u00AD]$/.test(buf)) buf = buf.replace(/[\-\u00AD]$/, "") + l.text;
      else buf += " " + l.text;
    } else buf = l.text;
  }
  if (buf) blocks.push({ text: buf, head: bufHead });
  return blocks;
}

let saveTimer;
function saveProgress() {
  if (!current) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    current.page = pageNum; current.screen = screenIdx; current.zoom = zoom;
    current.fontPx = fontPx; current.mode = mode; current.lastRead = Date.now();
    await dbPut(current);
  }, 400);
}

function go(d) {
  if (!pdfDoc) return;
  if (mode === "text") { goText(d); return; }
  const t = pageNum + d;
  if (t < 1 || t > pdfDoc.numPages) return;
  pageNum = t; screenIdx = 0; queuePage(pageNum);
}

$("prev").onclick = () => go(-1);
$("next").onclick = () => go(1);
$("tapLeft").onclick = () => go(-1);
$("tapRight").onclick = () => go(1);

$("zoomIn").onclick = async () => {
  if (mode === "text") { fontPx = Math.min(fontPx + 1, 34); $("zoomLevel").textContent = fontPx + "px"; pagedKey = ""; await ensurePaged(pageNum); clampScreen(); showText(); }
  else { zoom = Math.min(zoom + 0.15, 3); $("zoomLevel").textContent = Math.round(zoom * 100) + "%"; queuePage(pageNum); }
  saveProgress();
};
$("zoomOut").onclick = async () => {
  if (mode === "text") { fontPx = Math.max(fontPx - 1, 13); $("zoomLevel").textContent = fontPx + "px"; pagedKey = ""; await ensurePaged(pageNum); clampScreen(); showText(); }
  else { zoom = Math.max(zoom - 0.15, 0.5); $("zoomLevel").textContent = Math.round(zoom * 100) + "%"; queuePage(pageNum); }
  saveProgress();
};

$("modeBtn").onclick = async () => {
  mode = (mode === "text") ? "page" : "text";
  if (mode === "text") screenIdx = 0;
  pagedKey = "";
  applyModeUI();
  await renderCurrent();
  saveProgress();
};

$("backBtn").onclick = async () => {
  if (current) {
    current.page = pageNum; current.screen = screenIdx; current.zoom = zoom;
    current.fontPx = fontPx; current.mode = mode; current.lastRead = Date.now();
    await dbPut(current);
  }
  $("reader").style.display = "none";
  $("library").style.display = "flex";
  pdfDoc = null; current = null;
  renderShelf();
};

let barsHidden = false;
function toggleBars() {
  barsHidden = !barsHidden;
  $("topbar").classList.toggle("hidden", barsHidden);
  $("bar").classList.toggle("hidden", barsHidden);
}
$("canvasWrap").addEventListener("click", toggleBars);
$("reflowClip").addEventListener("click", toggleBars);

document.addEventListener("keydown", e => { if (e.key === "ArrowLeft") go(-1); if (e.key === "ArrowRight") go(1); });
let rt; window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(() => { if (pdfDoc) { pagedKey = ""; renderCurrent(); } }, 250); });

(async () => {
  await openDB();
  await loadProfiles();
  refreshChip();
  renderShelf();
})();
</script>
