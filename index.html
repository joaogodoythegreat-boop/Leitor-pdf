<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leitor">
<meta name="theme-color" content="#e8dcc0">
<title>Leitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  body.theme-sepia { --paper:#e8dcc0; --page:#f3ead4; --ink:#2e2a22; --ink-soft:#7a6f5c; --edge:#d4c5a3; --shadow:rgba(60,45,20,0.18); --glow:#efe4c8; }
  body.theme-light { --paper:#eceae6; --page:#ffffff; --ink:#23211d; --ink-soft:#8a8276; --edge:#dcd8d0; --shadow:rgba(40,40,40,0.16); --glow:#f5f4f1; }
  body.theme-dark  { --paper:#0e0e10; --page:#16161a; --ink:#d9d5cd; --ink-soft:#7e7a72; --edge:#303034; --shadow:rgba(0,0,0,0.55); --glow:#161618; }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: Georgia, "Times New Roman", serif; overscroll-behavior: none; -webkit-user-select: none; user-select: none; }

  /* BIBLIOTECA */
  #library { position: fixed; inset: 0; z-index: 20; background: radial-gradient(120% 60% at 50% -10%, var(--glow) 0%, var(--paper) 60%); display: flex; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .lib-head { padding: calc(env(safe-area-inset-top) + 26px) 22px 6px; }
  .lib-head h1 { font-size: 30px; font-weight: normal; letter-spacing: 0.5px; }
  #profileChip { margin: 14px 22px 0; align-self: flex-start; display: inline-flex; align-items: center; gap: 10px; padding: 7px 14px 7px 8px; border-radius: 30px; background: rgba(255,255,255,0.18); border: 1px solid var(--edge); cursor: pointer; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: bold; }
  #profileChip .pname { font-size: 15px; } #profileChip .caret { font-size: 11px; color: var(--ink-soft); }
  #addBtn { margin: 18px 22px; border: 1px solid var(--ink); background: transparent; color: var(--ink); font-family: inherit; font-size: 16px; padding: 14px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  #addBtn:active { background: var(--ink); color: var(--paper); }
  #shelf { padding: 0 18px 50px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px 18px; }
  @media (min-width: 520px) { #shelf { grid-template-columns: repeat(3, 1fr); } }
  .book { display: flex; flex-direction: column; cursor: pointer; position: relative; }
  .book-cover { width: 100%; aspect-ratio: 2 / 3; border-radius: 6px; overflow: hidden; background: var(--page) center/cover no-repeat; box-shadow: 0 6px 16px var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 30px; color: var(--ink-soft); }
  .book-title { font-size: 14px; line-height: 1.3; margin-top: 9px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .book-meta { font-size: 11px; color: var(--ink-soft); margin-top: 3px; }
  .progress-track { height: 3px; background: var(--edge); border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--ink-soft); border-radius: 3px; }
  .book-del { position: absolute; top: 6px; right: 6px; width: 28px; height: 28px; border: none; background: rgba(0,0,0,0.45); color: #fff; font-size: 14px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .empty { grid-column: 1 / -1; text-align: center; color: var(--ink-soft); padding: 50px 30px; font-size: 15px; line-height: 1.6; }

  #sheet { position: fixed; inset: 0; z-index: 40; display: none; background: rgba(10,8,4,0.45); }
  #sheet.on { display: block; }
  #sheetCard { position: absolute; left: 0; right: 0; bottom: 0; background: var(--paper); border-radius: 18px 18px 0 0; padding: 10px 16px calc(env(safe-area-inset-bottom) + 18px); max-height: 80%; overflow-y: auto; }
  .sheet-grip { width: 40px; height: 4px; background: var(--edge); border-radius: 3px; margin: 8px auto 14px; }
  .sheet-title { font-size: 18px; margin: 0 4px 12px; }
  .prow { display: flex; align-items: center; gap: 12px; padding: 12px 8px; border-radius: 10px; cursor: pointer; }
  .prow.active { background: rgba(127,127,127,0.16); }
  .prow .pname { flex: 1; font-size: 16px; } .prow .check { color: var(--ink-soft); font-size: 16px; }
  .prow .pdel { border: none; background: transparent; color: var(--ink-soft); font-size: 16px; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; }
  #addProfileBtn { width: 100%; margin-top: 8px; border: 1px dashed var(--ink-soft); background: transparent; color: var(--ink); font-family: inherit; font-size: 15px; padding: 13px; border-radius: 10px; cursor: pointer; }

  #nameModal { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; background: rgba(10,8,4,0.5); padding: 24px; }
  #nameModal.on { display: flex; }
  .modal-card { background: var(--paper); border-radius: 14px; padding: 22px; width: 100%; max-width: 340px; }
  .modal-card h3 { font-weight: normal; font-size: 18px; margin-bottom: 14px; }
  #nameInput { width: 100%; font-family: inherit; font-size: 16px; padding: 12px; border: 1px solid var(--edge); border-radius: 8px; background: var(--page); color: var(--ink); -webkit-user-select: text; user-select: text; }
  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions button { flex: 1; font-family: inherit; font-size: 15px; padding: 12px; border-radius: 8px; cursor: pointer; border: 1px solid var(--ink); }
  #nameCancel { background: transparent; color: var(--ink); } #nameSave { background: var(--ink); color: var(--paper); }

  /* LEITOR comum */
  #reader { display: none; position: fixed; inset: 0; background: var(--page); z-index: 10; }

  /* Engine TEXTO (a tela inteira é o "papel") */
  #textReader { position: absolute; inset: 0; background: var(--page); display: none; }
  #textReader.on { display: block; }
  #kindlePad { position: absolute; inset: 0; padding: calc(env(safe-area-inset-top) + 22px) 26px calc(40px + env(safe-area-inset-bottom)); }
  #kindlePage { width: 100%; height: 100%; overflow: hidden; -webkit-user-select: text; user-select: text; }
  #kindlePage mark.hl { background: rgba(255,214,71,0.5); color: inherit; border-radius: 2px; }
  .theme-dark #kindlePage mark.hl { background: rgba(255,214,71,0.28); }
  .kindle-text { font-family: Georgia, "Times New Roman", serif; color: var(--ink); line-height: 1.55; text-align: justify; -webkit-hyphens: auto; hyphens: auto; overflow-wrap: break-word; }
  .kindle-text p { margin: 0 0 0.32em; text-indent: 1.35em; }
  .kindle-text p.cont { text-indent: 0; }
  .kindle-text p.head { text-indent: 0; text-align: center; font-weight: bold; margin: 0.3em 0 0.8em; letter-spacing: 0.3px; }
  .kindle-text .imgwrap { height: 100%; display: flex; align-items: center; justify-content: center; }
  .kindle-text .imgwrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .theme-dark .kindle-text .imgwrap img { filter: invert(1) hue-rotate(180deg); }

  /* Engine IMAGEM (fallback) */
  #imgReader { position: absolute; inset: 0; display: none; }
  #imgReader.on { display: block; }
  #scroll { position: absolute; inset: 0; overflow: auto; -webkit-overflow-scrolling: touch; display: flex; justify-content: center; align-items: flex-start; padding: calc(env(safe-area-inset-top) + 14px) 0 calc(58px + env(safe-area-inset-bottom) + 14px); }
  #pageSheet { background: var(--page); box-shadow: 0 3px 22px var(--shadow); border-radius: 2px; margin: 0 auto; flex-shrink: 0; }
  #pageCanvas { display: block; width: 100%; height: auto; }
  .theme-sepia #pageCanvas { mix-blend-mode: multiply; }
  .theme-dark  #pageCanvas { filter: invert(1) hue-rotate(180deg); }

  #topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 14; padding: calc(env(safe-area-inset-top) + 8px) 14px 12px; background: linear-gradient(var(--page), rgba(0,0,0,0) 100%); display: flex; align-items: center; gap: 10px; transition: transform 0.25s ease, opacity 0.25s ease; }
  #topbar.hidden { transform: translateY(-110%); opacity: 0; pointer-events: none; }
  #backBtn { border: none; background: transparent; color: var(--ink); font-size: 24px; font-family: Georgia, serif; cursor: pointer; padding: 4px 8px; line-height: 1; }
  #topbar .spacer { flex: 1; }
  #aaBtn { border: 1px solid var(--ink-soft); background: transparent; color: var(--ink); font-family: Georgia, serif; font-size: 16px; padding: 4px 14px; border-radius: 16px; cursor: pointer; flex-shrink: 0; }

  #bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 14; height: calc(58px + env(safe-area-inset-bottom)); padding: 0 8px env(safe-area-inset-bottom); display: flex; align-items: center; justify-content: space-between; background: linear-gradient(rgba(0,0,0,0) 0%, var(--page) 55%); transition: transform 0.25s ease, opacity 0.25s ease; }
  #bar.hidden { transform: translateY(110%); opacity: 0; pointer-events: none; }
  #bar button { border: none; background: transparent; color: var(--ink); font-family: Georgia, serif; cursor: pointer; font-size: 28px; width: 56px; height: 46px; }
  /* número da página, discreto no canto inferior direito (estilo livro de papel) */
  #pageNum { position: fixed; right: 18px; bottom: calc(env(safe-area-inset-bottom) + 8px); z-index: 13; font-size: 12px; color: var(--ink-soft); font-family: Georgia, serif; }
  #progressLine { position: fixed; left: 0; right: 0; bottom: 0; height: 3px; z-index: 13; }
  #progressFill { height: 100%; width: 0%; background: var(--ink-soft); opacity: 0.4; transition: width 0.2s ease; }
  /* botão flutuante de grifar */
  #grifar { position: fixed; z-index: 22; display: none; transform: translate(-50%, 0); background: var(--ink); color: var(--page); border: none; font-family: inherit; font-size: 14px; padding: 9px 16px; border-radius: 20px; cursor: pointer; box-shadow: 0 3px 12px rgba(0,0,0,0.35); white-space: nowrap; }
  #grifar.on { display: block; }

  #settings { position: fixed; inset: 0; z-index: 16; display: none; background: rgba(10,8,4,0.35); }
  #settings.on { display: block; }
  #settingsCard { position: absolute; left: 0; right: 0; bottom: 0; background: var(--paper); border-radius: 18px 18px 0 0; padding: 10px 20px calc(env(safe-area-inset-bottom) + 22px); }
  .set-row { padding: 14px 2px; border-bottom: 1px solid var(--edge); } .set-row:last-child { border-bottom: none; }
  .set-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 12px; }
  .themes, .segs { display: flex; gap: 12px; }
  .swatch { flex: 1; height: 56px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .swatch.sel { border-color: var(--ink-soft); }
  .sw-sepia { background: #f3ead4; color: #2e2a22; } .sw-light { background: #ffffff; color: #23211d; } .sw-dark { background: #16161a; color: #d9d5cd; }
  .seg { flex: 1; height: 46px; border-radius: 10px; cursor: pointer; border: 1px solid var(--edge); background: transparent; color: var(--ink); font-family: inherit; font-size: 14px; }
  .seg.sel { border-color: var(--ink); background: var(--edge); }
  #fillRow { display: none; }
  .size-ctrl { display: flex; align-items: center; justify-content: space-between; }
  .size-ctrl button { border: 1px solid var(--ink-soft); background: transparent; color: var(--ink); font-family: Georgia, serif; font-size: 20px; width: 64px; height: 44px; border-radius: 10px; cursor: pointer; }
  .size-ctrl span { font-size: 15px; color: var(--ink); }

  #loading { position: fixed; inset: 0; display: none; flex-direction: column; gap: 16px; align-items: center; justify-content: center; background: var(--paper); color: var(--ink-soft); font-size: 15px; z-index: 30; padding: 40px; text-align: center; }
  #loadingBarWrap { width: 70%; max-width: 260px; height: 4px; background: var(--edge); border-radius: 3px; overflow: hidden; display: none; }
  #loadingBar { height: 100%; width: 0%; background: var(--ink-soft); transition: width 0.15s; }
</style>
</head>
<body class="theme-sepia">

<div id="library">
  <div class="lib-head"><h1>Biblioteca</h1></div>
  <div id="profileChip"><span class="avatar" id="chipAvatar">V</span><span class="pname" id="chipName">Você</span><span class="caret">▼</span></div>
  <button id="addBtn">+ Adicionar livro (PDF)</button>
  <input type="file" id="file" accept="application/pdf" hidden>
  <div id="shelf"></div>
</div>

<div id="sheet"><div id="sheetCard"><div class="sheet-grip"></div><div class="sheet-title">Quem está lendo?</div><div id="profileList"></div><button id="addProfileBtn">+ Novo leitor</button></div></div>

<div id="nameModal"><div class="modal-card"><h3>Novo leitor</h3><input id="nameInput" type="text" placeholder="Nome" maxlength="24" autocomplete="off"><div class="modal-actions"><button id="nameCancel">Cancelar</button><button id="nameSave">Salvar</button></div></div></div>

<div id="loading"><div id="loadingText">Carregando…</div><div id="loadingBarWrap"><div id="loadingBar"></div></div></div>

<div id="reader">
  <div id="textReader"><div id="kindlePad"><div id="kindlePage" class="kindle-text" lang="pt-BR"></div></div></div>
  <div id="imgReader"><div id="scroll"><div id="pageSheet"><canvas id="pageCanvas"></canvas></div></div></div>
  <div id="topbar"><button id="backBtn">‹</button><span class="spacer"></span><button id="aaBtn">Aa</button></div>
  <div id="bar"><button id="prev">‹</button><span class="spacer" style="flex:1"></span><button id="next">›</button></div>
  <div id="pageNum"></div>
  <div id="progressLine"><div id="progressFill"></div></div>
</div>

<button id="grifar">Grifar</button>

<div id="settings">
  <div id="settingsCard">
    <div class="sheet-grip"></div>
    <div class="set-row"><div class="set-label">Tema</div><div class="themes"><div class="swatch sw-sepia" data-theme="sepia">Sépia</div><div class="swatch sw-light" data-theme="light">Claro</div><div class="swatch sw-dark" data-theme="dark">Escuro</div></div></div>
    <div class="set-row"><div class="set-label">Modo de leitura</div><div class="segs"><button class="seg" data-mode="text">Texto</button><button class="seg" data-mode="image">Imagem</button></div></div>
    <div class="set-row" id="fillRow"><div class="set-label">Ajuste (modo imagem)</div><div class="segs"><button class="seg" data-fill="width">Largura</button><button class="seg" data-fill="crop">Cortar margens</button></div></div>
    <div class="set-row"><div class="set-label">Tamanho</div><div class="size-ctrl"><button id="sizeDown">A−</button><span id="sizeLabel">—</span><button id="sizeUp">A+</button></div></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
const EXTRACT_V = 1;
const DB_NAME = "leitorDB", STORE = "books", META = "meta";
const PALETTE = ["#c8a44d","#9a6b4f","#5f7d6a","#7a6f9c","#a85c6b","#5b7d99"];
let db;

function openDB() { return new Promise((res, rej) => { const r = indexedDB.open(DB_NAME, 2); r.onupgradeneeded = e => { const d = e.target.result; if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, { keyPath: "id" }); if (!d.objectStoreNames.contains(META)) d.createObjectStore(META, { keyPath: "k" }); }; r.onsuccess = e => { db = e.target.result; res(db); }; r.onerror = e => rej(e); }); }
function txS(s, m) { return db.transaction(s, m).objectStore(s); }
function dbGetAll() { return new Promise((res, rej) => { const out = []; const c = txS(STORE, "readonly").openCursor(); c.onsuccess = e => { const cur = e.target.result; if (cur) { out.push(cur.value); cur.continue(); } else res(out); }; c.onerror = rej; }); }
function dbGet(id) { return new Promise((res, rej) => { const r = txS(STORE, "readonly").get(id); r.onsuccess = () => res(r.result); r.onerror = rej; }); }
function dbPut(v) { return new Promise((res, rej) => { const r = txS(STORE, "readwrite").put(v); r.onsuccess = res; r.onerror = rej; }); }
function dbDel(id) { return new Promise((res, rej) => { const r = txS(STORE, "readwrite").delete(id); r.onsuccess = res; r.onerror = rej; }); }
function metaGet(k) { return new Promise((res, rej) => { const r = txS(META, "readonly").get(k); r.onsuccess = () => res(r.result); r.onerror = rej; }); }
function metaPut(k, v) { return new Promise((res, rej) => { const r = txS(META, "readwrite").put({ k: k, v: v }); r.onsuccess = res; r.onerror = rej; }); }

const $ = id => document.getElementById(id);
const tick = () => new Promise(r => setTimeout(r, 0));
const canvas = $("pageCanvas"), ctx = canvas.getContext("2d");
const tmp = document.createElement("canvas"); const tctx = tmp.getContext("2d", { willReadFrequently: true });

let pdfDoc = null, current = null;
let mode = "text", fillMode = "crop", theme = "sepia";
let zoom = 1.0;            // engine imagem
let fontPx = 20;          // engine texto
let imgPage = 1;          // engine imagem (página atual)
let screens = [{ h: "", pg: 1 }], screenIdx = 0, pageSig = "";
let rendering = false, pendingRender = false;

/* ===== Tema / modo / ajuste ===== */
function applyTheme(t) { theme = t; document.body.className = "theme-" + t; document.querySelector('meta[name=theme-color]').setAttribute("content", t === "dark" ? "#0e0e10" : (t === "light" ? "#eceae6" : "#e8dcc0")); document.querySelectorAll(".swatch").forEach(s => s.classList.toggle("sel", s.dataset.theme === t)); metaPut("theme", t); }
function syncModeUI() {
  document.querySelectorAll(".seg[data-mode]").forEach(s => s.classList.toggle("sel", s.dataset.mode === mode));
  document.querySelectorAll(".seg[data-fill]").forEach(s => s.classList.toggle("sel", s.dataset.fill === fillMode));
  $("fillRow").style.display = (mode === "image") ? "block" : "none";
  $("sizeLabel").textContent = (mode === "text") ? (fontPx + "px") : (Math.round(zoom * 100) + "%");
}

/* ===== Perfis ===== */
let profiles = { list: [{ id: "default", name: "Você", color: PALETTE[0] }], current: "default" };
async function loadProfiles() { const m = await metaGet("profiles"); if (m && m.v && m.v.list && m.v.list.length) profiles = m.v; else await saveProfiles(); }
function saveProfiles() { return metaPut("profiles", profiles); }
function curProf() { return profiles.list.find(p => p.id === profiles.current) || profiles.list[0]; }
function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
function refreshChip() { const p = curProf(); $("chipAvatar").textContent = (p.name[0] || "?").toUpperCase(); $("chipAvatar").style.background = p.color || PALETTE[0]; $("chipName").textContent = p.name; }
$("profileChip").onclick = () => { renderProfileList(); $("sheet").classList.add("on"); };
$("sheet").onclick = e => { if (e.target.id === "sheet") $("sheet").classList.remove("on"); };
function renderProfileList() { const list = $("profileList"); list.innerHTML = ""; profiles.list.forEach(p => { const row = document.createElement("div"); row.className = "prow" + (p.id === profiles.current ? " active" : ""); row.innerHTML = '<span class="avatar" style="background:' + (p.color || PALETTE[0]) + '">' + escapeHtml((p.name[0] || "?").toUpperCase()) + '</span><span class="pname">' + escapeHtml(p.name) + '</span>' + (p.id === profiles.current ? '<span class="check">✓</span>' : '') + (profiles.list.length > 1 ? '<button class="pdel">✕</button>' : ''); row.querySelector(".pname").onclick = () => switchProfile(p.id); row.querySelector(".avatar").onclick = () => switchProfile(p.id); const del = row.querySelector(".pdel"); if (del) del.onclick = (ev) => { ev.stopPropagation(); deleteProfile(p.id); }; list.appendChild(row); }); }
async function switchProfile(id) { profiles.current = id; await saveProfiles(); refreshChip(); $("sheet").classList.remove("on"); renderShelf(); }
async function deleteProfile(id) { const p = profiles.list.find(x => x.id === id); if (!p) return; if (!confirm('Remover o leitor "' + p.name + '" e todos os livros dele?')) return; const books = await dbGetAll(); for (const b of books) { if ((b.profile || "default") === id) await dbDel(b.id); } profiles.list = profiles.list.filter(x => x.id !== id); if (profiles.current === id) profiles.current = profiles.list[0].id; await saveProfiles(); refreshChip(); renderProfileList(); renderShelf(); }
$("addProfileBtn").onclick = () => { $("nameInput").value = ""; $("nameModal").classList.add("on"); setTimeout(() => $("nameInput").focus(), 50); };
$("nameCancel").onclick = () => $("nameModal").classList.remove("on");
$("nameSave").onclick = async () => { const name = $("nameInput").value.trim(); if (!name) { $("nameInput").focus(); return; } const id = "p_" + Date.now(); const color = PALETTE[profiles.list.length % PALETTE.length]; profiles.list.push({ id: id, name: name, color: color }); profiles.current = id; await saveProfiles(); $("nameModal").classList.remove("on"); refreshChip(); renderProfileList(); renderShelf(); };

/* ===== Biblioteca ===== */
async function renderShelf() {
  const all = await dbGetAll();
  const books = all.filter(b => (b.profile || "default") === profiles.current);
  books.sort((a, b) => (b.lastRead || 0) - (a.lastRead || 0));
  const shelf = $("shelf");
  if (!books.length) { shelf.innerHTML = '<div class="empty">Nenhum livro ainda.<br>Toque em &ldquo;Adicionar livro&rdquo; pra começar.</div>'; return; }
  shelf.innerHTML = "";
  for (const b of books) {
    const pct = b.pct || 0;
    const el = document.createElement("div"); el.className = "book";
    const coverStyle = b.cover ? ' style="background-image:url(' + b.cover + ')"' : '';
    el.innerHTML = '<div class="book-cover"' + coverStyle + '>' + (b.cover ? '' : '&#9636;') + '</div><button class="book-del">&#10005;</button><div class="book-title">' + escapeHtml(b.title) + '</div><div class="book-meta">' + (pct ? (pct + '% lido') : 'Não aberto') + '</div><div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
    el.querySelector(".book-cover").onclick = () => openBook(b.id);
    el.querySelector(".book-title").onclick = () => openBook(b.id);
    el.querySelector(".book-del").onclick = async (ev) => { ev.stopPropagation(); if (confirm('Remover "' + b.title + '" da biblioteca?')) { await dbDel(b.id); renderShelf(); } };

/* ===== Adicionar ===== */
$("addBtn").onclick = () => $("file").click();

async function makeCover(doc) { try { const page = await doc.getPage(1); const vp = page.getViewport({ scale: 1 }); const s = 300 / vp.width; const v = page.getViewport({ scale: s }); const c = document.createElement("canvas"); c.width = v.width; c.height = v.height; await page.render({ canvasContext: c.getContext("2d"), viewport: v }).promise; return c.toDataURL("image/jpeg", 0.72); } catch (e) { return null; } }

function showLoading(text, bar) { $("loadingText").textContent = text; $("loadingBarWrap").style.display = bar ? "block" : "none"; $("loadingBar").style.width = "0%"; $("loading").style.display = "flex"; }

/* ===== Abrir ===== */

/* ============================================================
   ENGINE TEXTO — transcrição + reflow + paginação por tela
   ============================================================ */
async function enterText() {
  if (!current.content || current.extractedV !== EXTRACT_V) {
    showLoading("Preparando livro…", true);
    await extractBook();
    await dbPut(current);
  }
  await paginateAndShow(true);
  hideLoading();
}

function textArea() { const el = $("kindlePage"); let W = el.clientWidth, H = el.clientHeight; if (W < 80) W = Math.min(window.innerWidth - 48, 620); if (H < 120) H = window.innerHeight - 150; return { W: W, H: H }; }

async function paginateAndShow(restore) {
  const a = textArea();
  const sig = fontPx + "|" + a.W + "|" + a.H + "|" + EXTRACT_V;
  if (sig !== pageSig || screens.length <= 1) {
    showLoading("Ajustando ao seu celular…", true);
    const savedFrac = (current.tpos && current.tpos.total) ? (current.tpos.screen / current.tpos.total) : 0;
    screens = await paginateAll(current.content, a.W, a.H, fontPx);
    pageSig = sig;
    if (restore) {
      if (current.tpos && current.tpos.sig === sig) screenIdx = current.tpos.screen;
      else screenIdx = Math.round(savedFrac * (screens.length - 1));
    }
    hideLoading();
  }
  if (screenIdx > screens.length - 1) screenIdx = screens.length - 1;
  if (screenIdx < 0) screenIdx = 0;
  showScreen();
}

function showScreen() {
  const sc = screens[screenIdx] || { h: "", pg: 1 };
  $("kindlePage").innerHTML = sc.h || "";
  applyHighlights($("kindlePage"));
  const total = screens.length;
  $("pageNum").textContent = sc.pg || "";
  $("progressFill").style.width = (total > 1 ? (screenIdx / (total - 1) * 100) : 0) + "%";
  saveText();
}

let saveT;
function saveText() {
  if (!current) return;
  clearTimeout(saveT);
  saveT = setTimeout(async () => {
    const a = textArea();
    current.mode = "text"; current.fontPx = fontPx;
    current.tpos = { screen: screenIdx, total: screens.length, sig: fontPx + "|" + a.W + "|" + a.H + "|" + EXTRACT_V };
    current.pct = screens.length > 1 ? Math.round(screenIdx / (screens.length - 1) * 100) : 0;

/* Extrai o livro inteiro -> current.content = [{t:'p'|'h', s} | {t:'img', d}] */
async function extractBook() {
  const N = pdfDoc.numPages;
  const pagesData = [];
  for (let i = 1; i <= N; i++) {
    setLoading("Preparando livro… " + Math.round(i / N * 100) + "%", Math.round(i / N * 100));
    let page, tc;
    try { page = await pdfDoc.getPage(i); tc = await page.getTextContent(); } catch (e) { continue; }
    let textLen = 0;
    for (const it of tc.items) if (it.str) textLen += it.str.trim().length;
    let asImage = false;
    if (textLen < 500) {
      let hasImg = false;
      try {
        const ops = await page.getOperatorList();
        for (let k = 0; k < ops.fnArray.length; k++) {
          const fn = ops.fnArray[k];
          if (fn === pdfjsLib.OPS.paintImageXObject || fn === pdfjsLib.OPS.paintInlineImageXObject || fn === pdfjsLib.OPS.paintImageMaskXObject || fn === pdfjsLib.OPS.paintJpegXObject) { hasImg = true; break; }
        }
      } catch (e) {}
      if (textLen < 120 || hasImg) asImage = true;
    }
    if (asImage) { const d = await renderPageImage(page); if (d) pagesData.push({ img: d, pg: i }); else pagesData.push({ lines: buildLines(tc), pg: i }); }
    else pagesData.push({ lines: buildLines(tc), pg: i });
    if (i % 6 === 0) await tick();
  }
  // detecta cabeçalhos/rodapés repetidos
  const freq = {}; let textPages = 0;
  for (const p of pagesData) {
    if (!p.lines || !p.lines.length) continue; textPages++;
    const ends = [p.lines[0], p.lines[p.lines.length - 1]];
    ends.forEach(l => { if (l) { const k = norm(l.text); if (k) freq[k] = (freq[k] || 0) + 1; } });
  }
  const thr = Math.max(4, Math.round((textPages || 1) * 0.3));
  const boiler = new Set(Object.keys(freq).filter(k => freq[k] >= thr));
  // monta blocos (cada bloco guarda a página de origem)
  const content = [];
  for (const p of pagesData) {
    if (p.img) { content.push({ t: "img", d: p.img, pg: p.pg }); continue; }
    const blocks = linesToBlocks(p.lines, boiler);
    for (const b of blocks) { b.pg = p.pg; content.push(b); }
  }
  mergeAcrossPages(content);
  current.content = content; current.extractedV = EXTRACT_V;
}

async function renderPageImage(page) {
  try { const vp = page.getViewport({ scale: 1 }); const s = Math.min(1100 / vp.width, 2.2); const v = page.getViewport({ scale: s }); const c = document.createElement("canvas"); c.width = v.width; c.height = v.height; await page.render({ canvasContext: c.getContext("2d"), viewport: v }).promise; return c.toDataURL("image/jpeg", 0.75); } catch (e) { return null; }
}

function buildLines(tc) {
  const raw = tc.items.filter(it => typeof it.str === "string" && it.str.length);
  if (!raw.length) return [];
  const lines = [];
  for (const it of raw) {
    const x = it.transform[4], y = it.transform[5];
    const fs = Math.hypot(it.transform[0], it.transform[1]) || it.height || 12;
    let line = null;
    for (const l of lines) { if (Math.abs(l.y - y) <= Math.max(3, fs * 0.4)) { line = l; break; } }
    if (!line) { line = { y: y, items: [] }; lines.push(line); }
    line.items.push({ x: x, str: it.str, w: it.width || 0, fs: fs });
  }
  lines.sort((a, b) => b.y - a.y);
  const L = [];
  for (const l of lines) {
    l.items.sort((a, b) => a.x - b.x);
    let text = "", prevEnd = null, minX = Infinity, maxFs = 0;
    for (const it of l.items) {
      if (prevEnd !== null) { const gap = it.x - prevEnd; if (gap > it.fs * 0.25 && !/\s$/.test(text) && !/^\s/.test(it.str)) text += " "; }
      text += it.str; prevEnd = it.x + it.w; if (it.x < minX) minX = it.x; if (it.fs > maxFs) maxFs = it.fs;
    }
    text = text.replace(/\s+/g, " ").trim();
    if (text) L.push({ y: l.y, x0: minX, fs: maxFs, text: text });
  }
  return L;
}

function norm(t) { return t.toLowerCase().replace(/[0-9]+/g, "#").replace(/\s+/g, " ").trim(); }
function isPageNumber(t) { const s = t.trim(); if (s.length > 14) return false; if (!/[0-9ivxlcdm]/i.test(s)) return false; return /^[\s0-9.\-–—ivxlcdm|]+$/i.test(s) || /^(p[áa]gina|page|cap[íi]tulo)\s*[0-9ivxlcdm]+$/i.test(s); }

function linesToBlocks(lines, boiler) {
  if (!lines || !lines.length) return [];
  let L = lines.slice();
  // remove cabeçalho/rodapé/numeração nas pontas
  const drop = l => l && (boiler.has(norm(l.text)) || isPageNumber(l.text));
  while (L.length && drop(L[0])) L.shift();
  while (L.length && drop(L[L.length - 1])) L.pop();
  if (!L.length) return [];
  const gaps = [];
  for (let i = 1; i < L.length; i++) gaps.push(Math.abs(L[i - 1].y - L[i].y));
  gaps.sort((a, b) => a - b);
  const medGap = gaps.length ? gaps[Math.floor(gaps.length / 2)] : 0;
  const leftMin = Math.min.apply(null, L.map(l => l.x0));
  const fsArr = L.map(l => l.fs).sort((a, b) => a - b);
  const bodyFs = fsArr[Math.floor(fsArr.length / 2)] || 12;
  const blocks = []; let buf = "", bufHead = false;
  for (let i = 0; i < L.length; i++) {
    const l = L[i], prev = L[i - 1]; let brk = false;
    if (i > 0) {
      const g = Math.abs(prev.y - l.y);
      if (medGap && g > medGap * 1.6) brk = true;
      if (l.x0 > leftMin + l.fs * 0.8) brk = true;
      if (Math.abs(l.fs - prev.fs) > 1.5) brk = true;
    }
    if (brk && buf) { blocks.push({ t: bufHead ? "h" : "p", s: buf }); buf = ""; bufHead = false; }
    if (!buf) bufHead = (l.fs > bodyFs * 1.18 && l.text.length < 80);
    if (buf) { if (/[\-\u00AD]$/.test(buf)) buf = buf.replace(/[\-\u00AD]$/, "") + l.text; else buf += " " + l.text; }
    else buf = l.text;
  }
  if (buf) blocks.push({ t: bufHead ? "h" : "p", s: buf });
  return blocks;
}

/* junta parágrafo que vira a página (sem pontuação final + minúscula no começo) */
function mergeAcrossPages(content) {
  for (let i = content.length - 1; i > 0; i--) {
    const cur = content[i], prev = content[i - 1];
    if (cur.t === "p" && prev.t === "p") {
      const endsOpen = !/[.!?:;"”’)]\s*$/.test(prev.s);
      const startsLower = /^[a-zà-ú(]/.test(cur.s);
      if (endsOpen && startsLower) {
        if (/[\-\u00AD]$/.test(prev.s)) prev.s = prev.s.replace(/[\-\u00AD]$/, "") + cur.s;
        else prev.s = prev.s + " " + cur.s;
        content.splice(i, 1);
      }
    }
  }
}

/* Pagina os blocos em telas {h, pg} que cabem em W x H (medição real, sem cortar) */
async function paginateAll(content, W, H, fpx) {
  const box = document.createElement("div");
  box.className = "kindle-text";
  box.style.cssText = "position:absolute;left:-99999px;top:0;width:" + W + "px;font-size:" + fpx + "px;";
  box.setAttribute("lang", "pt-BR");
  document.body.appendChild(box);
  const out = [];
  let curPg = null;
  const push = () => { if (box.childNodes.length) { out.push({ h: box.innerHTML, pg: curPg || 1 }); box.innerHTML = ""; curPg = null; } };
  let i = 0;
  for (const b of content) {
    if (curPg === null && b.pg) curPg = b.pg;
    if (b.t === "img") { push(); out.push({ h: '<div class="imgwrap"><img src="' + b.d + '"></div>', pg: b.pg || 1 }); }
    else {
      const p = document.createElement("p"); if (b.t === "h") p.className = "head"; p.textContent = b.s; box.appendChild(p);
      if (box.scrollHeight > H + 1) {
        if (box.childNodes.length === 1) { box.removeChild(p); curPg = b.pg; await splitInto(b, box, out, H, () => { out.push({ h: box.innerHTML, pg: curPg || b.pg || 1 }); box.innerHTML = ""; }); }
        else { box.removeChild(p); push(); curPg = b.pg; box.appendChild(p); if (box.scrollHeight > H + 1) { box.removeChild(p); await splitInto(b, box, out, H, () => { out.push({ h: box.innerHTML, pg: curPg || b.pg || 1 }); box.innerHTML = ""; }); } }
      }
    }
    if ((++i % 60) === 0) { setLoading("Ajustando ao seu celular… " + Math.round(i / content.length * 100) + "%", Math.round(i / content.length * 100)); await tick(); }
  }
  push();
  document.body.removeChild(box);
  return out.length ? out : [{ h: "", pg: 1 }];
}

async function splitInto(b, box, out, H, push) {
  const words = b.s.split(/\s+/);
  let p = document.createElement("p"); if (b.t === "h") p.className = "head"; box.appendChild(p);
  let cur = [];
  for (let i = 0; i < words.length; i++) {
    cur.push(words[i]); p.textContent = cur.join(" ");
    if (box.scrollHeight > H + 1) {
      if (cur.length > 1) { cur.pop(); p.textContent = cur.join(" "); push(); p = document.createElement("p"); p.className = "cont"; box.appendChild(p); cur = [words[i]]; p.textContent = cur.join(" "); }
      else { push(); p = document.createElement("p"); p.className = "cont"; box.appendChild(p); cur = []; }
    }
  }
}

/* ============================================================
   ENGINE IMAGEM — render da página (fallback)
   ============================================================ */
function detectCrop(srcW, srcH) {
  let data; try { data = tctx.getImageData(0, 0, srcW, srcH).data; } catch (e) { return null; }
  let minX = srcW, minY = srcH, maxX = 0, maxY = 0, found = false;
  const step = Math.max(1, Math.floor(Math.min(srcW, srcH) / 500)); const thr = 40;
  for (let y = 0; y < srcH; y += step) for (let x = 0; x < srcW; x += step) {
    const i = (y * srcW + x) * 4; const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
    if (data[i + 3] > 20 && lum < 255 - thr) { found = true; if (x < minX) minX = x; if (x > maxX) maxX = x; if (y < minY) minY = y; if (y > maxY) maxY = y; }
  }
  if (!found || maxX <= minX || maxY <= minY) return null;
  const px = srcW * 0.018, py = srcH * 0.018;
  return { x: Math.max(0, minX - px), y: Math.max(0, minY - py), w: Math.min(srcW, maxX + px) - Math.max(0, minX - px), h: Math.min(srcH, maxY + py) - Math.max(0, minY - py) };
}
function renderImg() {
  if (!pdfDoc) return; if (rendering) { pendingRender = true; return; } rendering = true;
  pdfDoc.getPage(imgPage).then(async page => {
    const unscaled = page.getViewport({ scale: 1 }); const ratio = window.devicePixelRatio || 1;
    const crop = (fillMode === "crop"); const pad = crop ? 16 : 0;
    const sheetW = Math.min(window.innerWidth * (crop ? 0.97 : 0.93), 780) * zoom; const cssW = Math.max(40, sheetW - 2 * pad);
    let tmpW = Math.min(2200, Math.round(cssW * ratio * (crop ? 1.3 : 1.05))); const scale0 = tmpW / unscaled.width;
    const vp0 = page.getViewport({ scale: scale0 }); tmp.width = Math.floor(vp0.width); tmp.height = Math.floor(vp0.height);
    tctx.setTransform(1, 0, 0, 1, 0, 0); await page.render({ canvasContext: tctx, viewport: vp0 }).promise;
    let box = { x: 0, y: 0, w: tmp.width, h: tmp.height }; if (crop) { const c = detectCrop(tmp.width, tmp.height); if (c) box = c; }
    const dispScale = (cssW * ratio) / box.w; const cH = Math.round(box.h * dispScale);
    canvas.width = Math.round(cssW * ratio); canvas.height = cH; canvas.style.width = cssW + "px"; canvas.style.height = (cH / ratio) + "px";
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.imageSmoothingQuality = "high";
    ctx.drawImage(tmp, box.x, box.y, box.w, box.h, 0, 0, canvas.width, canvas.height);
    $("pageSheet").style.width = sheetW + "px"; $("pageSheet").style.padding = pad + "px";
    $("pageNum").textContent = imgPage;
    $("progressFill").style.width = (pdfDoc.numPages ? (imgPage / pdfDoc.numPages * 100) : 0) + "%";
    $("scroll").scrollTop = 0; saveImg();
    rendering = false; if (pendingRender) { pendingRender = false; renderImg(); }
  }).catch(() => { rendering = false; });
}
let saveI;
function saveImg() { if (!current) return; clearTimeout(saveI); saveI = setTimeout(async () => { current.mode = "image"; current.page = imgPage; current.zoom = zoom; current.pct = pdfDoc ? Math.round(imgPage / pdfDoc.numPages * 100) : 0; current.lastRead = Date.now(); await dbPut(current); }, 400); }

/* ===== Navegação ===== */
function go(d) {
  if (mode === "text") {
    const t = screenIdx + d; if (t < 0 || t > screens.length - 1) return; screenIdx = t; showScreen();
  } else {
    if (!pdfDoc) return; const t = imgPage + d; if (t < 1 || t > pdfDoc.numPages) return; imgPage = t; renderImg();
  }
}

let barsHidden = false;
function showBars(v) { barsHidden = !v; $("topbar").classList.toggle("hidden", barsHidden); $("bar").classList.toggle("hidden", barsHidden); }
function toggleBars() { showBars(barsHidden); }
function tapHandler(e) {
  if ($("settings").classList.contains("on")) { $("settings").classList.remove("on"); return; }
  // tocar num grifo existente -> oferecer remover (não vira página)
  if (e.target && e.target.tagName === "MARK") { e.stopPropagation(); removeHighlightAt(e.target); return; }
  // se há texto selecionado, não vira página (deixa o usuário grifar)
  const sel = window.getSelection();
  if (sel && sel.toString().trim().length > 0) return;
  const w = window.innerWidth, x = e.clientX;
  if (x < w * 0.30) go(-1); else if (x > w * 0.70) go(1); else toggleBars();
}
$("kindlePad").addEventListener("click", tapHandler);
$("scroll").addEventListener("click", tapHandler);
$("prev").onclick = (e) => { e.stopPropagation(); go(-1); };
$("next").onclick = (e) => { e.stopPropagation(); go(1); };
$("backBtn").onclick = async () => {
  if (current) { if (mode === "text") saveText(); else saveImg(); }
  $("reader").style.display = "none"; $("library").style.display = "flex"; pdfDoc = null; current = null; screens = [{ h: "", pg: 1 }]; pageSig = ""; renderShelf();
};

/* ===== Grifos (highlight) ===== */
let selText = "";
function bookHL() { if (!current.highlights) current.highlights = []; return current.highlights; }

document.addEventListener("selectionchange", () => {
  if (mode !== "text" || !current) { hideGrifar(); return; }
  const sel = window.getSelection();
  const t = sel ? sel.toString().trim() : "";
  if (t.length > 0 && sel.rangeCount) {
    selText = t;
    try {
      const r = sel.getRangeAt(0).getBoundingClientRect();
      if (r && r.width) {
        const g = $("grifar");
        g.style.left = Math.min(window.innerWidth - 60, Math.max(60, r.left + r.width / 2)) + "px";
        g.style.top = (r.bottom + 10) + "px";
        g.classList.add("on");
      }
    } catch (e) {}
  } else { selText = ""; hideGrifar(); }
});
function hideGrifar() { $("grifar").classList.remove("on"); }

$("grifar").addEventListener("click", (e) => {
  e.stopPropagation();
  const sel = window.getSelection();
  const txt = (sel && sel.toString().trim()) || selText;
  if (!txt) { hideGrifar(); return; }
  const hs = bookHL();
  if (!hs.some(h => h.text === txt)) hs.push({ text: txt, ts: Date.now() });
  if (sel) sel.removeAllRanges();
  hideGrifar();
  showScreen();            // re-renderiza e reaplica os grifos
  saveText();
});

/* envolve as ocorrências dos grifos salvos no container renderizado */
function applyHighlights(root) {
  const hs = (current && current.highlights) ? current.highlights : [];
  if (!hs.length) return;
  for (const h of hs) wrapText(root, h.text);
}
function wrapText(root, text) {
  if (!text) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
  for (const node of nodes) {
    if (node.parentNode && node.parentNode.tagName === "MARK") continue;
    const idx = node.nodeValue.indexOf(text);
    if (idx >= 0) {
      try {
        const range = document.createRange();
        range.setStart(node, idx); range.setEnd(node, idx + text.length);
        const mark = document.createElement("mark"); mark.className = "hl";
        range.surroundContents(mark);
      } catch (e) {}
      return;
    }
  }
}
function removeHighlightAt(markEl) {
  const txt = markEl.textContent;
  if (!confirm('Remover este grifo?')) return;
  const hs = bookHL();
  const i = hs.findIndex(h => h.text === txt);
  if (i >= 0) hs.splice(i, 1);
  showScreen(); saveText();
}

document.querySelectorAll(".seg[data-fill]").forEach(s => { s.onclick = () => { fillMode = s.dataset.fill; metaPut("fill", fillMode); syncModeUI(); if (mode === "image") renderImg(); }; });
$("sizeUp").onclick = async () => { if (mode === "text") { fontPx = Math.min(fontPx + 1, 30); syncModeUI(); pageSig = ""; await paginateAndShow(false); } else { zoom = Math.min(zoom + 0.1, 2.2); syncModeUI(); renderImg(); } };
$("sizeDown").onclick = async () => { if (mode === "text") { fontPx = Math.max(fontPx - 1, 13); syncModeUI(); pageSig = ""; await paginateAndShow(false); } else { zoom = Math.max(zoom - 0.1, 0.6); syncModeUI(); renderImg(); } };

document.addEventListener("keydown", e => { if (e.key === "ArrowLeft") go(-1); if (e.key === "ArrowRight") go(1); });
let rt; window.addEventListener("resize", () => { clearTimeout(rt); rt = setTimeout(async () => { if (!current) return; if (mode === "text") { pageSig = ""; await paginateAndShow(false); } else renderImg(); }, 300); });

(async () => {
  await openDB();
  const tm = await metaGet("theme"); applyTheme(tm && tm.v ? tm.v : "sepia");
  const fm = await metaGet("fill"); fillMode = (fm && fm.v) ? fm.v : "crop";
  await loadProfiles(); refreshChip(); renderShelf();
})();
</script>
</body>
</html>
